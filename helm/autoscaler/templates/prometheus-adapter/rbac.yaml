{{- if .Values.prometheusAdapter.enabled }}
# This RoleBinding allows the prometheus-adapter to read the
# extension-apiserver-authentication ConfigMap in kube-system.
# This is required for the adapter to function as an aggregated API server.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.prometheusAdapter.name }}-auth-reader
  namespace: kube-system
  labels:
    {{- include "autoscaler.prometheusAdapter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
- kind: ServiceAccount
  name: {{ .Values.prometheusAdapter.name }}
  namespace: {{ include "autoscaler.namespace" . }}
{{- end }}