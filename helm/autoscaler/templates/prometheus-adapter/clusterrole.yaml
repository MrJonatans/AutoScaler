{{- if .Values.prometheusAdapter.enabled }}
# ClusterRole and bindings required for prometheus-adapter to register
# the custom.metrics.k8s.io API server.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.prometheusAdapter.name }}-server-resources
  labels:
    {{- include "autoscaler.prometheusAdapter.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiregistration.k8s.io"]
    resources: ["apiservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.prometheusAdapter.name }}-resource-reader
  labels:
    {{- include "autoscaler.prometheusAdapter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.prometheusAdapter.name }}-server-resources
subjects:
  - kind: ServiceAccount
    name: {{ .Values.prometheusAdapter.name }}
    namespace: {{ include "autoscaler.namespace" . }}
---
# Allow prometheus-adapter to delegate authentication to the main API server
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.prometheusAdapter.name }}:system:auth-delegator
  labels:
    {{- include "autoscaler.prometheusAdapter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.prometheusAdapter.name }}
    namespace: {{ include "autoscaler.namespace" . }}
{{- end }}
