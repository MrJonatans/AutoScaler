{{- if .Values.prometheusAdapter.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.prometheusAdapter.name }}-config
  namespace: {{ include "autoscaler.namespace" . }}
  labels:
    {{- include "autoscaler.prometheusAdapter.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.prometheusAdapter.config.rules }}
    rules:
    {{- toYaml .Values.prometheusAdapter.config.rules | nindent 4 }}
    {{- end }}
    {{- if .Values.prometheusAdapter.config.externalRules }}
    externalRules:
    {{- toYaml .Values.prometheusAdapter.config.externalRules | nindent 4 }}
    {{- end }}
{{- end }}