{{- if .Values.kubeStateMetrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.kubeStateMetrics.name }}-service
  namespace: {{ include "autoscaler.namespace" . }}
  labels:
    {{- include "autoscaler.kubeStateMetrics.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "autoscaler.kubeStateMetrics.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.kubeStateMetrics.port }}
    targetPort: 8080
    protocol: TCP
    name: http
{{- end }}
