{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.prometheus.name }}-config
  namespace: {{ include "autoscaler.namespace" . }}
  labels:
    {{- include "autoscaler.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.config.scrapeInterval }}
    scrape_configs:
    - job_name: 'autoscaler-app'
      static_configs:
      - targets: ['{{ .Values.app.name }}-service:{{ .Values.app.service.port }}']
    {{- if .Values.prometheus.config.additionalScrapeConfigs }}
    {{- toYaml .Values.prometheus.config.additionalScrapeConfigs | nindent 4 }}
    {{- end }}
{{- end }}