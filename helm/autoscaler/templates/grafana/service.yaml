{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.grafana.name }}-service
  namespace: {{ include "autoscaler.namespace" . }}
  labels:
    {{- include "autoscaler.grafana.labels" . | nindent 4 }}
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: {{ .Values.grafana.service.targetPort }}
      {{- if .Values.grafana.service.nodePort }}
      nodePort: {{ .Values.grafana.service.nodePort }}
      {{- end }}
      protocol: TCP
      name: http
  selector:
    {{- include "autoscaler.grafana.selectorLabels" . | nindent 4 }}
{{- end }}