apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.grafana.name }}-dashboards-provider
  namespace: {{ include "autoscaler.namespace" . }}
  labels:
    {{- include "autoscaler.grafana.labels" . | nindent 4 }}
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "AutoScaler"
        orgId: 1
        folder: "AutoScaler"
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards