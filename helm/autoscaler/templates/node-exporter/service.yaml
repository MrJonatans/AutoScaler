{{- if .Values.nodeExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nodeExporter.name }}-service
  namespace: {{ include "autoscaler.namespace" . }}
  labels:
    {{- include "autoscaler.nodeExporter.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "autoscaler.nodeExporter.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.nodeExporter.port }}
    targetPort: {{ .Values.nodeExporter.port }}
    protocol: TCP
    name: metrics
{{- end }}
