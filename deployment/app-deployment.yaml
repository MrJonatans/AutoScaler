apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler-app
  namespace: autoscaling-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscaler-app
  template:
    metadata:
      labels:
        app: autoscaler-app
    spec:
      containers:
      - name: app
        image: autoscaler-app:latest
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: 500m
          requests:
            cpu: 250m