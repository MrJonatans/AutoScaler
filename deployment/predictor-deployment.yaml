apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler-predictor
  namespace: autoscaling-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscaler-predictor
  template:
    metadata:
      labels:
        app: autoscaler-predictor
    spec:
      containers:
      - name: predictor
        image: autoscaler-predictor:latest
        ports:
        - containerPort: 8001
        resources:
          limits:
            cpu: 500m
          requests:
            cpu: 250m