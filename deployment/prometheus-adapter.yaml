apiVersion: v1
kind: ConfigMap
metadata:
  name: adapter-config
  namespace: autoscaling-ns
data:
  config.yaml: |
    rules:
    - seriesQuery: '{__name__=~"predicted_cpu"}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        matches: predicted_cpu
        as: predicted_cpu
      metricsQuery: avg(predicted_cpu)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-adapter
  namespace: autoscaling-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-adapter
  template:
    metadata:
      labels:
        app: prometheus-adapter
    spec:
      containers:
      - name: prometheus-adapter
        image: k8s.gcr.io/prometheus-adapter/prometheus-adapter:v0.10.0
        args:
        - --config=/etc/adapter/config.yaml
        - --prometheus-url=http://prometheus-service:9090/
        - --metrics-relist-interval=30s
        - --v=4
        ports:
        - containerPort: 443
        volumeMounts:
        - name: config
          mountPath: /etc/adapter
      volumes:
      - name: config
        configMap:
          name: adapter-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-adapter-service
  namespace: autoscaling-ns
spec:
  selector:
    app: prometheus-adapter
  ports:
  - port: 443
    targetPort: 443
    protocol: TCP